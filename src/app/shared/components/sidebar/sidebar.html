<aside class="sidebar">
  <div class="sb-brand">
    <div class="sb-logo">
      <svg width="20" height="20" viewBox="0 0 22 22" fill="none">
        <path d="M4 11C4 7.13 7.13 4 11 4C14.87 4 18 7.13 18 11" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
        <circle cx="11" cy="11" r="3" fill="white"/>
      </svg>
    </div>
    <span class="sb-name">PayVault</span>
  </div>

  <nav class="sb-nav">
    <div class="sb-section">Main</div>
    <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" class="sb-link">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="1" y="1" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.6"/><rect x="10" y="1" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.6"/><rect x="1" y="10" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.6"/><rect x="10" y="10" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.6"/></svg>
      Dashboard
    </a>
    <a routerLink="/wallet" routerLinkActive="active" class="sb-link">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="1" y="4" width="16" height="12" rx="2.5" stroke="currentColor" stroke-width="1.6"/><path d="M1 8h16M12 12h2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      My Wallet
    </a>
    <a routerLink="/transactions" routerLinkActive="active" class="sb-link">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 5h12M3 9h8M3 13h5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      Transactions
    </a>

    <div class="sb-section">Actions</div>
    <a routerLink="/topup" routerLinkActive="active" class="sb-link">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Top Up
    </a>
    <a routerLink="/transfer" routerLinkActive="active" class="sb-link">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9h12M11 5l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Transfer
    </a>
    <a routerLink="/withdraw" routerLinkActive="active" class="sb-link">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3v12M3 15h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Withdraw
    </a>

    <div class="sb-section">Account</div>
    <a routerLink="/kyc" routerLinkActive="active" class="sb-link">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 1L16 4V8C16 12.4 12.9 16.3 9 18C5.1 16.3 2 12.4 2 8V4L9 1Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
      KYC Verification
    </a>
    <a routerLink="/notifications" routerLinkActive="active" class="sb-link">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2a5 5 0 00-5 5v3l-2 2v1h14v-1l-2-2V7a5 5 0 00-5-5zM7 15a2 2 0 004 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      Notifications
    </a>
    <a routerLink="/profile" routerLinkActive="active" class="sb-link">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="6" r="4" stroke="currentColor" stroke-width="1.6"/><path d="M1 17c0-4 3.58-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      Profile
    </a>
  </nav>

  <div class="sb-user">
    <div class="sb-av">{{ initials }}</div>
    <div class="sb-uinfo">
      <div class="sb-uname">{{ username }}</div>
      <div class="sb-uemail">{{ email }}</div>
    </div>
    <button class="sb-logout" (click)="logout()" title="Logout">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 2H13a1 1 0 011 1v10a1 1 0 01-1 1H10M7 11l3-3-3-3M10 8H2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</aside>
